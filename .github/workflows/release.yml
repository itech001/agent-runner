name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agent-runner-aarch64-macos
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: agent-runner-x86_64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-runner-x86_64-windows.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --manifest-path agent-runner/Cargo.toml

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp agent-runner/target/${{ matrix.target }}/release/agent-runner ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy agent-runner\target\${{ matrix.target }}\release\agent-runner.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create SHA256 checksums
        run: |
          cd artifacts
          sha256sum */* > ../checksums-sha256.txt
          mv ../checksums-sha256.txt .

      - name: Generate release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=nightly-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: agent-runner ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*
